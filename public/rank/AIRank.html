.stat-number {

.stat-label {

.filter-group select:focus {

  border-color: var(--primary);

.theme-toggle {

  background: var(--bg);
  color: var(--text);

let filteredData = [...data];
let currentSort = { field: 'rank', asc: true };

function getTier(mtbench) {
  if (mtbench >= 9.0) return 'T0';
  if (mtbench >= 8.3) return 'T1';
  if (mtbench >= 7.5) return 'T2';
  if (mtbench >= 6.0) return 'T3';
  return 'T4';
}

function getOpensourceBadgeClass(status) {
  if (status.includes('开源') && !status.includes('部分') && !status.includes('受限')) return 'badge-opensource';
  if (status === '否' || status === '闭源商用') return 'badge-closed';
  if (status === '部分开源') return 'badge-partial';
  if (status === '商用受限') return 'badge-restricted';
  return 'badge-closed';
}

function getMultimodalBadgeClass(val) {
  if (val === '是') return 'badge-yes';
  if (val === '否') return 'badge-no';
  return 'badge-optional';
}

function renderTable() {
  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = '';

  filteredData.forEach((item, index) => {
    const tier = getTier(item.mtbench);
    const rankClass = item.rank <= 3 ? `rank-${item.rank}` : '';
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td class="rank ${rankClass}">${item.rank}</td>
      <td>
        <div class="model-name">${item.name}</div>
        <span class="badge badge-${tier.toLowerCase()}">${tier}</span>
      </td>
      <td><span class="vendor">${item.vendor}</span></td>
      <td><span class="badge ${getOpensourceBadgeClass(item.opensource)}">${item.opensource}</span></td>
      <td class="score">${item.context}</td>
      <td><span class="badge ${getMultimodalBadgeClass(item.multimodal)}">${item.multimodal}</span></td>
      <td class="score">${item.mmlu}</td>
      <td class="score">${item.ceval}</td>
      <td class="score"><strong>${item.mtbench}</strong></td>
      <td class="price">$${item.priceIn}</td>
      <td class="price">$${item.priceOut}</td>
      <td class="highlight">${item.highlight}</td>
    `;
    tbody.appendChild(tr);
  });

  updateStats();
  updateSortIndicators();
}

function updateStats() {
  document.getElementById('totalCount').textContent = filteredData.length;
  document.getElementById('domesticCount').textContent = filteredData.filter(d => d.domestic).length;
  document.getElementById('opensourceCount').textContent = filteredData.filter(d => 
    d.opensource.includes('开源') && !d.opensource.includes('部分') && !d.opensource.includes('受限')
  ).length;
  document.getElementById('multimodalCount').textContent = filteredData.filter(d => d.multimodal === '是').length;
}

function updateSortIndicators() {
  document.querySelectorAll('th.sortable').forEach(th => {
    th.classList.remove('sort-asc', 'sort-desc');
    if (th.dataset.sort === currentSort.field) {
      th.classList.add(currentSort.asc ? 'sort-asc' : 'sort-desc');
    }
  });
}

function applyFilters() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const opensourceFilter = document.getElementById('opensourceFilter').value;
  const multimodalFilter = document.getElementById('multimodalFilter').value;
  const tierFilter = document.getElementById('tierFilter').value;

  filteredData = data.filter(item => {
    if (search && !item.name.toLowerCase().includes(search) && !item.vendor.toLowerCase().includes(search)) {
      return false;
    }
    if (opensourceFilter !== 'all') {
      if (opensourceFilter === '闭源' && item.opensource !== '否' && item.opensource !== '闭源商用') return false;
      if (opensourceFilter === '开源' && !item.opensource.includes('开源') && !item.opensource.includes('Apache') && !item.opensource.includes('MIT') && !item.opensource.includes('Gemma')) return false;
      if (opensourceFilter === '商用受限' && item.opensource !== '商用受限') return false;
    }
    if (multimodalFilter !== 'all' && item.multimodal !== multimodalFilter) {
      return false;
    }
    if (tierFilter !== 'all') {
      const tier = getTier(item.mtbench);
      if (tier !== tierFilter) return false;
    }
    return true;
  });

  sortData();
}

function sortData() {
  const field = currentSort.field;
  const asc = currentSort.asc;

  filteredData.sort((a, b) => {
    let valA = a[field];
    let valB = b[field];

    if (typeof valA === 'string' && !isNaN(parseFloat(valA))) {
      valA = parseFloat(valA);
      valB = parseFloat(valB);
    }

    if (typeof valA === 'number') {
      return asc ? valA - valB : valB - valA;
    }
    return asc ? String(valA).localeCompare(String(valB)) : String(valB).localeCompare(String(valA));
  });

  renderTable();
}

// 事件监听
document.getElementById('searchInput').addEventListener('input', applyFilters);
document.getElementById('opensourceFilter').addEventListener('change', applyFilters);
document.getElementById('multimodalFilter').addEventListener('change', applyFilters);
document.getElementById('tierFilter').addEventListener('change', applyFilters);

document.querySelectorAll('th.sortable').forEach(th => {
  th.addEventListener('click', () => {
    const field = th.dataset.sort;
    if (currentSort.field === field) {
      currentSort.asc = !currentSort.asc;
    } else {
      currentSort.field = field;
      currentSort.asc = field === 'rank' || field === 'mtbench' ? false : true;
    }
    sortData();
  });
});

// 主题切换
const themeToggle = document.getElementById('themeToggle');
const savedTheme = localStorage.getItem('theme') || 'light';
document.documentElement.setAttribute('data-theme', savedTheme);
themeToggle.textContent = savedTheme === 'dark' ? '☀️' : '🌓';

themeToggle.addEventListener('click', () => {
  const current = document.documentElement.getAttribute('data-theme');
  const next = current === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
  themeToggle.textContent = next === 'dark' ? '☀️' : '🌓';
});

// 初始化
renderTable();
