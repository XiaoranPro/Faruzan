let selectedTags = new Set();  // 选中的标签

// 从作品的 genre 字段提取单个标签
function extractTags(s) {
  if (!s) return [];
  return s.split(/[\s,，、]+/).filter(Boolean);
}

// 工具函数
const $ = id => document.getElementById(id);
const esc = s => String(s == null ? '' : s)
  .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
  .replace(/"/g,'&quot;').replace(/'/g,'&#39;');

function uniqueValues(key) {
  return [...new Set(DATA.map(d => d[key]).filter(Boolean))].sort();
}

function typeBadge(t) {
  if (!t) return '<span class="badge badge-other">-</span>';
  const cls = t.includes('TV') ? 'badge-tv'
    : t.includes('剧场') || t.includes('电影') || t.includes('Movie') ? 'badge-movie'
    : t.includes('OVA') || t.includes('OAD') || t.includes('ONA') ? 'badge-ova'
    : 'badge-other';
  return `<span class="badge ${cls}">${esc(t)}</span>`;
}

function statusBadge(s) {
  if (!s) return '-';
  const cls = s.includes('完结') ? 'badge-status-end'
    : s.includes('连载') || s.includes('播出') || s.includes('更新') ? 'badge-status-air'
    : s.includes('未') || s.includes('待') ? 'badge-status-wait'
    : 'badge-status-end';
  return `<span class="badge ${cls}">${esc(s)}</span>`;
}

function renderTags(s) {
  if (!s) return '-';
  return extractTags(s)
    .map(t => `<span class="tag-table-chip ${selectedTags.has(t) ? 'active' : ''}" data-tag="${esc(t)}">${esc(t)}</span>`)
    .join(' ');
}

// 初始化筛选器
function initFilters() {
  const yearSel = $('filterYear'), typeSel = $('filterType'),
        statusSel = $('filterStatus'), regionSel = $('filterRegion');
  uniqueValues('year').forEach(v => yearSel.add(new Option(v, v)));
  uniqueValues('type').forEach(v => typeSel.add(new Option(v, v)));
  uniqueValues('status').forEach(v => statusSel.add(new Option(v, v)));
  uniqueValues('region').forEach(v => regionSel.add(new Option(v, v)));
}

// 标签云：从全部作品的 genre 字段聚合
function renderTagCloud() {
  const counter = new Map();
  DATA.forEach(d => extractTags(d.genre).forEach(t => counter.set(t, (counter.get(t) || 0) + 1)));
  const sorted = [...counter.entries()].sort((a, b) => b[1] - a[1]);
  $('tagCloud').innerHTML = sorted.map(([t, c]) =>
    `<span class="tag-chip ${selectedTags.has(t) ? 'active' : ''}" data-tag="${esc(t)}">${esc(t)}<span class="count">${c}</span></span>`
  ).join('');
  $('tagCloud').querySelectorAll('.tag-chip').forEach(chip => {
    chip.addEventListener('click', () => toggleTag(chip.dataset.tag));
  });
  if (selectedTags.size > 0) {
    $('tagSelectedBar').classList.add('show');
    $('tagSelectedList').innerHTML = [...selectedTags]
      .map(t => `<span class="tag-chip active" data-tag="${esc(t)}">${esc(t)} <span class="count">✕</span></span>`)
      .join('');
    $('tagSelectedList').querySelectorAll('.tag-chip').forEach(chip => {
      chip.addEventListener('click', () => toggleTag(chip.dataset.tag));
    });
    $('tagClearAll').style.display = 'inline-block';
  } else {
    $('tagSelectedBar').classList.remove('show');
    $('tagClearAll').style.display = 'none';
  }
}

function toggleTag(tag) {
  if (selectedTags.has(tag)) selectedTags.delete(tag);
  else selectedTags.add(tag);
  renderTagCloud();
  document.querySelectorAll('.tag-table-chip').forEach(el => {
    el.classList.toggle('active', selectedTags.has(el.dataset.tag));
  });
  applyFilter();
}

$('tagClearAll').addEventListener('click', () => {
  selectedTags.clear();
  renderTagCloud();
  document.querySelectorAll('.tag-table-chip').forEach(el => el.classList.remove('active'));
  applyFilter();
});

// 统计信息
function renderStats() {
  const byType = {};
  const byYear = {};
  DATA.forEach(d => {
    byType[d.type || '其他'] = (byType[d.type || '其他'] || 0) + 1;
    byYear[d.year || '其他'] = (byYear[d.year || '其他'] || 0) + 1;
  });
  const topYear = Object.entries(byYear).sort((a,b) => b[1]-a[1])[0];
  const topType = Object.entries(byType).sort((a,b) => b[1]-a[1])[0];
  const airing = DATA.filter(d => (d.status || '').includes('连载') || (d.status || '').includes('更新')).length;
  $('statsBar').innerHTML = `
    <div class="stat">📅 <b>${topYear[0]}</b> 年最多（${topYear[1]} 部）</div>
    <div class="stat">🎬 <b>${topType[0]}</b> 最多（${topType[1]} 部）</div>
    <div class="stat">▶ 正在连载 <b>${airing}</b> 部</div>
    <div class="stat">✓ 已完结 <b>${DATA.length - airing}</b> 部</div>
  `;
}

// 过滤+排序
function applyFilter() {
  const q = $('searchInput').value.toLowerCase().trim();
  const y = $('filterYear').value, t = $('filterType').value,
        s = $('filterStatus').value, r = $('filterRegion').value;
  filtered = DATA.filter(d => {
    if (y && d.year !== y) return false;
    if (t && d.type !== t) return false;
    if (s && d.status !== s) return false;
    if (r && d.region !== r) return false;
    if (q) {
      const hay = (d.title + ' ' + d.jp + ' ' + d.other + ' ' + d.author + ' ' + d.studio).toLowerCase();
      if (!hay.includes(q)) return false;
    }
    if (selectedTags.size > 0) {
      const tags = extractTags(d.genre);
      if (!tags.some(tg => selectedTags.has(tg))) return false;
    }
    return true;
  });
  currentPage = 1;
  sortAndRender();
}

function sortAndRender() {
  if (sortCol) {
    filtered.sort((a, b) => {
      let av = a[sortCol] || '', bv = b[sortCol] || '';
      if (sortCol === 'idx') { av = +av; bv = +bv; }
      else if (sortCol === 'date') { av = av || '9999'; bv = bv || '9999'; }
      else { av = String(av); bv = String(bv); }
      if (av < bv) return sortAsc ? -1 : 1;
      if (av > bv) return sortAsc ? 1 : -1;
      return 0;
    });
  }
  // 更新表头排序标记
  document.querySelectorAll('thead th').forEach(th => {
    th.classList.toggle('active', th.dataset.col === sortCol);
    const m = th.querySelector('.sort-mark');
    if (m) m.textContent = th.dataset.col === sortCol ? (sortAsc ? '↑' : '↓') : '↕';
  });
  renderTable();
}

function renderTable() {
  const total = filtered.length;
  const start = (currentPage - 1) * PAGE_SIZE;
  const pageData = filtered.slice(start, start + PAGE_SIZE);
  const tbody = $('tableBody');
  if (total === 0) {
    tbody.innerHTML = '';
    $('emptyState').style.display = 'block';
  } else {
    $('emptyState').style.display = 'none';
    tbody.innerHTML = pageData.map(d => `
      <tr>
        <td class="col-idx">${d.idx}</td>
        <td class="col-title"><a href="${esc(d.url)}" target="_blank" rel="noopener">${esc(d.title || '-')}</a></td>
        <td class="col-jp">${esc(d.jp || '-')}</td>
        <td>${typeBadge(d.type)}</td>
        <td>${esc(d.region || '-')}</td>
        <td>${esc(d.author || '-')}</td>
        <td>${esc(d.studio || '-')}</td>
        <td>${esc(d.date || '-')}</td>
        <td>${statusBadge(d.status)}</td>
        <td>${renderTags(d.genre)}</td>
      </tr>
    `).join('');
  }
  // 分页
  $('resultInfo').textContent = `共 ${total} 条 · 第 ${currentPage}/${Math.max(1, Math.ceil(total / PAGE_SIZE))} 页`;
  const totalPages = Math.ceil(total / PAGE_SIZE);
  const nav = [];
  nav.push(`<button class="page-btn" ${currentPage === 1 ? 'disabled' : ''} onclick="goPage(${currentPage-1})">‹ 上一页</button>`);
  let from = Math.max(1, currentPage - 2), to = Math.min(totalPages, from + 4);
  from = Math.max(1, to - 4);
  for (let p = from; p <= to; p++) {
    nav.push(`<button class="page-btn ${p === currentPage ? 'active' : ''}" onclick="goPage(${p})">${p}</button>`);
  }
  nav.push(`<button class="page-btn" ${currentPage >= totalPages ? 'disabled' : ''} onclick="goPage(${currentPage+1})">下一页 ›</button>`);
  $('pageNav').innerHTML = nav.join('');
}

window.goPage = p => { currentPage = p; renderTable(); window.scrollTo({top: 0, behavior: 'smooth'}); };

// 事件
$('searchInput').addEventListener('input', applyFilter);
['filterYear','filterType','filterStatus','filterRegion'].forEach(id => {
  $(id).addEventListener('change', applyFilter);
});
document.querySelectorAll('thead th').forEach(th => {
  th.addEventListener('click', () => {
    const col = th.dataset.col;
    if (sortCol === col) sortAsc = !sortAsc;
    else { sortCol = col; sortAsc = true; }
    sortAndRender();
  });
});

// 初始化
initFilters();
renderStats();
renderTagCloud();
sortAndRender();
</script>
</body>
</html>
